<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitation to Moksha</title>
    <style>
        body {
            background-color: #f5f5dc; /* Beige/Brown theme */
            color: #4b3621; /* Brown text */
            font-family: Arial, sans-serif;
            text-align: center;
        }
        h1 {
            margin-top: 50px;
        }
        #carousel {
            margin: auto;
            width: 80%;
            overflow: hidden;
        }
        .carousel-image {
            width: 100%;
            display: none;
        }
        .active {
            display: block;
        }
        .button {
            padding: 10px 20px;
            background-color: #4b3621;
            color: white;
            border: none;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>Are you ready for the guilt trip this time?</h1>
    <div id="carousel">
        <img class="carousel-image active" src="image1.jpg" alt="Memory 1">
        <img class="carousel-image" src="image2.jpg" alt="Memory 2">
        <img class="carousel-image" src="image3.jpg" alt="Memory 3">
        <img class="carousel-image" src="image4.jpg" alt="Memory 4">
    </div>
    <button class="button" onclick="nextImage()">Next</button>
    <script>
        let currentIndex = 0;
        const images = document.querySelectorAll('.carousel-image');
        function nextImage() {
            images[currentIndex].classList.remove('active');
            currentIndex = (currentIndex + 1) % images.length;
            images[currentIndex].classList.add('active');
        }
    </script>
</body>
</html>
